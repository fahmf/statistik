<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistik Pengadilan Agama Indonesia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script src="data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f8f6;
    --surface: #ffffff;
    --surface2: #f0f2ef;
    --border: #e2e5df;
    --text: #1a1f18;
    --text2: #4a5248;
    --text3: #8a9388;
    --accent: #10b981;
    --accent2: #059669;
    --accent-soft: #d1fae5;
    --accent-dim: #6ee7b7;
    --blue: #3b82f6;
    --amber: #f59e0b;
    --purple: #8b5cf6;
    --red: #ef4444;
    --cyan: #06b6d4;
    --orange: #f97316;
    --lime: #84cc16;
    --sidebar: 260px;
    --header: 64px;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    --shadow-lg: 0 4px 16px rgba(0,0,0,.08), 0 12px 32px rgba(0,0,0,.06);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    height: var(--header);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    flex-shrink: 0;
    z-index: 100;
    box-shadow: 0 1px 0 var(--border);
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .header-logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-logo-text { line-height: 1.2; }
  .header-logo-text strong { font-size: 14px; font-weight: 700; color: var(--text); display: block; }
  .header-logo-text span { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .header-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
  .header-stats { display: flex; gap: 24px; flex: 1; }
  .hstat { display: flex; flex-direction: column; gap: 1px; }
  .hstat-val { font-size: 18px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .hstat-val span { font-size: 12px; font-weight: 500; color: var(--accent); }
  .hstat-lbl { font-size: 11px; color: var(--text3); }
  .header-controls { display: flex; gap: 8px; align-items: center; margin-left: auto; }
  select, button {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    outline: none;
    transition: border-color .15s, background .15s;
  }
  select:hover, button:hover { border-color: var(--accent); }
  button.active, button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  button.primary:hover { background: var(--accent2); }

  /* ── Layout ── */
  .app-body { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  aside {
    width: var(--sidebar);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600;
    color: var(--text3); letter-spacing: .06em; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%; padding: 6px 10px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text); outline: none;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .province-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .province-item {
    padding: 8px 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: space-between;
    transition: background .1s; border-radius: 0;
    font-size: 13px;
  }
  .province-item:hover { background: var(--surface2); }
  .province-item.active { background: var(--accent-soft); color: var(--accent2); font-weight: 600; }
  .province-item .pname { flex: 1; }
  .province-item .pbadge {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--text3); background: var(--surface2);
    padding: 2px 6px; border-radius: 4px;
  }
  .province-item.active .pbadge { background: var(--accent-dim); color: var(--accent2); }
  .province-list::-webkit-scrollbar { width: 4px; }
  .province-list::-webkit-scrollbar-track { background: transparent; }
  .province-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .compare-panel {
    border-top: 1px solid var(--border);
    padding: 12px;
    background: var(--bg);
  }
  .compare-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .compare-slots { display: flex; gap: 6px; }
  .compare-slot {
    flex: 1; padding: 6px 8px; border-radius: 8px; border: 1.5px dashed var(--border);
    font-size: 11px; color: var(--text3); text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s; min-height: 36px;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .compare-slot.filled { border-style: solid; border-color: var(--accent); background: var(--accent-soft); color: var(--accent2); font-weight: 500; }
  .compare-slot .remove-btn { cursor: pointer; opacity: .6; }
  .compare-slot .remove-btn:hover { opacity: 1; }

  /* ── Main ── */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .view-tabs {
    display: flex; gap: 0; padding: 0 24px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    padding: 14px 18px; font-size: 13px; font-weight: 500;
    color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s; white-space: nowrap;
    background: none; border-left: none; border-top: none; border-right: none; border-radius: 0;
  }
  .tab:hover { color: var(--text); border-color: var(--border); }
  .tab.active { color: var(--accent2); border-color: var(--accent); font-weight: 600; }

  .content-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 18px; }
  .content-area::-webkit-scrollbar { width: 6px; }
  .content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Cards ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px 12px; display: flex; align-items: flex-start;
    justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--border);
  }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .card-subtitle { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .card-body { padding: 16px 20px; }
  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-sm {
    padding: 4px 10px; font-size: 11px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text2);
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-sm.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent2); }

  /* ── Grid layouts ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }

  /* ── Chart containers ── */
  .chart-wrap { position: relative; }
  .chart-wrap canvas { display: block; }

  /* ── Map ── */
  #map-container {
    width: 100%; background: var(--bg); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  #map-container svg { width: 100%; height: auto; }
  .map-tooltip {
    position: fixed; pointer-events: none; z-index: 999;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; box-shadow: var(--shadow-lg);
    font-size: 12px; min-width: 160px; display: none;
  }
  .map-tooltip strong { font-size: 13px; display: block; margin-bottom: 4px; color: var(--text); }
  .map-tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; color: var(--text2); }
  .map-tooltip .tt-val { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--text); }
  .map-legend { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
  .legend-swatch { width: 20px; height: 8px; border-radius: 3px; }

  /* ── Heatmap ── */
  .heatmap-wrap { overflow-x: auto; }
  .heatmap-table { border-collapse: collapse; font-size: 11px; min-width: 600px; width: 100%; }
  .heatmap-table th {
    padding: 6px 10px; background: var(--bg); border: 1px solid var(--border);
    font-weight: 600; color: var(--text3); text-align: center; white-space: nowrap;
  }
  .heatmap-table th:first-child { text-align: left; min-width: 140px; }
  .heatmap-table td {
    padding: 5px 8px; border: 1px solid var(--border); text-align: center;
    font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer;
    transition: opacity .15s;
  }
  .heatmap-table td:first-child {
    text-align: left; font-family: 'DM Sans', sans-serif;
    color: var(--text2); font-weight: 500; white-space: nowrap;
  }
  .heatmap-table tr:hover td { filter: brightness(.95); }

  /* ── Detail / Kota table ── */
  .kota-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .kota-table th {
    padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 600;
    color: var(--text3); text-transform: uppercase; letter-spacing: .05em;
    border-bottom: 2px solid var(--border); white-space: nowrap;
  }
  .kota-table th:not(:first-child) { text-align: right; }
  .kota-table td {
    padding: 9px 12px; border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .kota-table td:not(:first-child) { text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; }
  .kota-table tr:hover td { background: var(--surface2); }
  .kota-table .bar-cell { display: flex; align-items: center; gap: 8px; }
  .kota-bar { height: 6px; background: var(--accent); border-radius: 3px; min-width: 2px; transition: width .3s; }

  /* ── Year slider ── */
  .year-slider-wrap { display: flex; align-items: center; gap: 12px; padding: 0 4px; }
  .year-slider {
    flex: 1; -webkit-appearance: none; height: 4px;
    background: var(--border); border-radius: 2px; outline: none;
    cursor: pointer;
  }
  .year-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    background: var(--accent); border-radius: 50%; cursor: pointer;
    border: 3px solid white; box-shadow: 0 0 0 1px var(--accent);
  }
  .year-label { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); min-width: 42px; }
  .play-btn {
    width: 32px; height: 32px; border-radius: 50%; background: var(--accent);
    color: white; border: none; cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .play-btn:hover { background: var(--accent2); }

  /* ── Kasus filter pills ── */
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
    border: 1.5px solid var(--border); background: var(--bg);
    color: var(--text2); cursor: pointer; transition: all .15s;
  }
  .pill:hover { border-color: var(--text3); }
  .pill.active { color: white; border-color: transparent; }

  /* ── Summary bar (top kasus) ── */
  .summary-bars { display: flex; flex-direction: column; gap: 6px; }
  .sbar-row { display: flex; align-items: center; gap: 10px; }
  .sbar-label { font-size: 12px; color: var(--text2); min-width: 130px; text-align: right; }
  .sbar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .sbar-fill { height: 100%; border-radius: 4px; transition: width .5s cubic-bezier(.4,0,.2,1); }
  .sbar-val { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); min-width: 55px; }

  /* ── Province detail breadcrumb ── */
  .breadcrumb {
    display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3);
    padding-bottom: 2px;
  }
  .breadcrumb a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb-sep { color: var(--border); }

  /* ── Compare chart ── */
  .compare-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px;
    border-radius: 6px; font-size: 12px; font-weight: 500; }

  /* ── Animated value ── */
  .animated-val { transition: all .4s; }

  /* ── Responsive tweaks ── */
  @media (max-width: 1100px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
  }

  /* ── Loading skeleton ── */
  .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Tweaks panel ── */
  #tweaks-panel {
    position: fixed; bottom: 24px; right: 24px; z-index: 1000;
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    box-shadow: var(--shadow-lg); padding: 16px; width: 240px; display: none;
  }
  #tweaks-panel.visible { display: block; }
  .tweaks-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center; }
  .tweaks-close { cursor: pointer; color: var(--text3); font-size: 16px; line-height: 1; }
  .tweaks-row { margin-bottom: 10px; }
  .tweaks-row label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 4px; }
  .tweaks-row select { width: 100%; }

  /* ── No data state ── */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px; color: var(--text3); font-size: 13px; gap: 8px; text-align: center; }
  .empty-state .icon { font-size: 28px; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-logo">
    <div class="header-logo-icon">⚖️</div>
    <div class="header-logo-text">
      <strong>Statistik Pengadilan Agama</strong>
      <span>SIPA · Indonesia · BPS/Badilag</span>
    </div>
  </div>
  <div class="header-divider"></div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-val" id="stat-total">—</div>
      <div class="hstat-lbl">Total Kasus Nasional</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="stat-terbanyak">—</div>
      <div class="hstat-lbl">Jenis Kasus Terbanyak</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="stat-provinsi">—</div>
      <div class="hstat-lbl">Provinsi Tertinggi</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="stat-tren">— <span id="stat-tren-pct">—</span></div>
      <div class="hstat-lbl">Tren vs Tahun Lalu</div>
    </div>
  </div>
  <div class="header-controls">
    <select id="tahun-select"></select>
    <button class="primary" onclick="toggleTweaks()">⚙ Tampilan</button>
  </div>
</header>

<div class="app-body">
  <!-- Sidebar: daftar provinsi -->
  <aside>
    <div class="sidebar-header">
      <span>Provinsi (34)</span>
      <span id="sidebar-mode-lbl" style="color:var(--accent);font-size:10px;text-transform:none;letter-spacing:0">Nasional</span>
    </div>
    <div class="sidebar-search">
      <input type="text" id="prov-search" placeholder="Cari provinsi…" oninput="filterProvinsi(this.value)">
    </div>
    <div class="province-list" id="province-list"></div>
    <div class="compare-panel">
      <div class="compare-title">⟵ Bandingkan Provinsi</div>
      <div class="compare-slots">
        <div class="compare-slot" id="cmp-a" onclick="handleCompareSlotClick('a')">
          <span id="cmp-a-text">+ Pilih A</span>
        </div>
        <div class="compare-slot" id="cmp-b" onclick="handleCompareSlotClick('b')">
          <span id="cmp-b-text">+ Pilih B</span>
        </div>
      </div>
      <button onclick="doCompare()" style="width:100%;margin-top:8px;background:var(--accent);color:white;border-color:var(--accent);font-size:12px;padding:6px">Bandingkan</button>
    </div>
  </aside>

  <!-- Main content -->
  <main>
    <!-- Tabs -->
    <div class="view-tabs">
      <button class="tab active" data-tab="overview" onclick="switchTab('overview')">Ringkasan</button>
      <button class="tab" data-tab="peta" onclick="switchTab('peta')">Peta Choropleth</button>
      <button class="tab" data-tab="tren" onclick="switchTab('tren')">Tren Tahunan</button>
      <button class="tab" data-tab="komposisi" onclick="switchTab('komposisi')">Komposisi Kasus</button>
      <button class="tab" data-tab="heatmap" onclick="switchTab('heatmap')">Heatmap</button>
      <button class="tab" data-tab="detail" onclick="switchTab('detail')">Detail Kota</button>
      <button class="tab" data-tab="compare" onclick="switchTab('compare')">Bandingkan</button>
    </div>

    <!-- Tab content -->
    <div class="content-area" id="content-area"></div>
  </main>
</div>

<!-- Tooltip for map -->
<div class="map-tooltip" id="map-tooltip"></div>

<!-- Tweaks panel -->
<div id="tweaks-panel">
  <div class="tweaks-title">
    Tampilan
    <span class="tweaks-close" onclick="toggleTweaks()">×</span>
  </div>
  <div class="tweaks-row">
    <label>Filter Jenis Kasus</label>
    <select id="twk-jenis" onchange="applyKasusTweak(this.value)">
      <option value="all">Semua Jenis</option>
    </select>
  </div>
  <div class="tweaks-row">
    <label>Skema Warna Peta</label>
    <select id="twk-skema" onchange="applySkema(this.value)">
      <option value="hijau">Hijau (default)</option>
      <option value="biru">Biru</option>
      <option value="ungu">Ungu</option>
      <option value="jingga">Jingga</option>
    </select>
  </div>
  <div class="tweaks-row">
    <label>Satuan Angka</label>
    <select id="twk-satuan" onchange="applySatuan(this.value)">
      <option value="absolut">Absolut (kasus)</option>
      <option value="per100k">Per 100.000 penduduk</option>
    </select>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
const { DATA, TAHUN, JENIS_KASUS, PROVINSI_DATA, totalProvinsiTahun, totalNasionalTahun, totalJenisTahun } = window.STATISTIK;

const _charts = {};
function _destroyChart(id) { if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; } }

let state = {
  tahun: 2024,
  tab: 'overview',
  selectedProv: null,
  compareA: null,
  compareB: null,
  filterKasus: 'all',
  skema: 'hijau',
  satuan: 'absolut',
  playInterval: null,
  playing: false,
};

// Skema warna peta
const SKEMA = {
  hijau:  d3.scaleSequential().domain([0, 1]).interpolator(d3.interpolate('#d1fae5', '#065f46')),
  biru:   d3.scaleSequential().domain([0, 1]).interpolator(d3.interpolate('#dbeafe', '#1e3a8a')),
  ungu:   d3.scaleSequential().domain([0, 1]).interpolator(d3.interpolate('#ede9fe', '#4c1d95')),
  jingga: d3.scaleSequential().domain([0, 1]).interpolator(d3.interpolate('#fef3c7', '#92400e')),
};

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  buildTahunSelect();
  buildProvinsiList();
  buildTweakJenis();
  updateHeader();
  renderTab();
  registerTweaks();
});

// ════════════════════════════════════════════
// DATA HELPERS
// ════════════════════════════════════════════
function getTotalProv(provId) {
  if (state.filterKasus === 'all') {
    const raw = totalProvinsiTahun(DATA, provId, state.tahun);
    return state.satuan === 'per100k'
      ? Math.round(raw / (DATA[provId].pop || 1) * 100)
      : raw;
  } else {
    const raw = DATA[provId]?.tahunan[state.tahun]?.[state.filterKasus] || 0;
    return state.satuan === 'per100k'
      ? Math.round(raw / (DATA[provId].pop || 1) * 100)
      : raw;
  }
}

function getTotalNasional() {
  return PROVINSI_DATA.reduce((s, p) => s + getTotalProv(p.id), 0);
}

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'jt';
  if (n >= 1000) return (n/1000).toFixed(1) + 'rb';
  return n?.toLocaleString('id-ID') || '0';
}
function fmtFull(n) { return n?.toLocaleString('id-ID') || '0'; }
function pct(a, b) { return b ? ((a/b)*100).toFixed(1) + '%' : '—'; }

// ════════════════════════════════════════════
// HEADER STATS
// ════════════════════════════════════════════
function updateHeader() {
  const total = PROVINSI_DATA.reduce((s, p) => s + totalProvinsiTahun(DATA, p.id, state.tahun), 0);
  const totalPrev = PROVINSI_DATA.reduce((s, p) => s + totalProvinsiTahun(DATA, p.id, state.tahun - 1 || state.tahun), 0);

  // Jenis terbanyak
  const jenisTot = JENIS_KASUS.map(jk => ({ jk, tot: totalJenisTahun(DATA, jk.id, state.tahun) }));
  jenisTot.sort((a,b) => b.tot - a.tot);
  const topJenis = jenisTot[0];

  // Provinsi tertinggi
  const provTot = PROVINSI_DATA.map(p => ({ p, tot: totalProvinsiTahun(DATA, p.id, state.tahun) }));
  provTot.sort((a,b) => b.tot - a.tot);
  const topProv = provTot[0];

  const tren = totalPrev ? ((total - totalPrev) / totalPrev * 100) : 0;

  document.getElementById('stat-total').textContent = fmtFull(total);
  document.getElementById('stat-terbanyak').textContent = topJenis.jk.label;
  document.getElementById('stat-provinsi').textContent = topProv.p.nama.replace('Jawa ', 'Jawa ');
  document.getElementById('stat-tren').childNodes[0].textContent = fmtFull(total) + ' ';
  const pctEl = document.getElementById('stat-tren-pct');
  pctEl.textContent = (tren >= 0 ? '▲' : '▼') + Math.abs(tren).toFixed(1) + '%';
  pctEl.style.color = tren > 0 ? '#ef4444' : '#10b981';
}

function switchTab(tab) {
  state.tab = tab;

}

function renderTab() {
  const ca = document.getElementById('content-area');

  switch (state.tab) {
    case 'overview':   renderOverview(ca); break;
    case 'peta':       renderPeta(ca); break;
    case 'tren':       renderTren(ca); break;
    case 'komposisi':  renderKomposisi(ca); break;
    case 'heatmap':    renderHeatmap(ca); break;
    case 'detail':     renderDetail(ca); break;
    case 'compare':    renderCompare(ca); break;
  }
}

let mapSvg = null, mapColorScale = null, mapPlayInterval = null, mapPlaying = false;

async function buildMap() {
  const container = document.getElementById('map-container');
  if (!container) return;
  container.innerHTML = '<div style="color:var(--text3);font-size:13px">Memuat peta…</div>';

  let geo;
  try {
    const resp = await fetch('https://cdn.jsdelivr.net/npm/indonesia-topojson@1.0.0/indonesia.json');
    if (!resp.ok) throw new Error('topojson not found');
    const tj = await resp.json();
    geo = topojson.feature(tj, tj.objects[Object.keys(tj.objects)[0]]);
  } catch(e) {
    // Fallback: simple list view
    container.innerHTML = buildFallbackMap();
    return;
  }

  renderD3Map(container, geo);
}

function renderD3Map(container, geo) {
  container.innerHTML = '';
  const W = container.clientWidth, H = container.clientHeight || 480;

  const svg = d3.select(container).append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('width', W).attr('height', H)
    .style('background', 'var(--bg)');
  mapSvg = svg;

  const projection = d3.geoMercator().fitSize([W, H], geo);
  const path = d3.geoPath().projection(projection);

  const values = PROVINSI_DATA.map(p => getTotalProv(p.id));
  const maxVal = d3.max(values);
  mapColorScale = d3.scaleSequential([0, maxVal], SKEMA[state.skema].interpolator());

  // Province name normalization for topojson matching
  function matchProv(geoName) {
    if (!geoName) return null;
    const n = geoName.toLowerCase().replace(/[^a-z\s]/g, '').trim();
    return PROVINSI_DATA.find(p => {
      const pn = p.nama.toLowerCase().replace(/[^a-z\s]/g, '').trim();
      return n.includes(pn.split(' ')[0]) || pn.includes(n.split(' ')[0]);
    });
  }

  svg.selectAll('path').data(geo.features).join('path')
    .attr('d', path)
    .attr('fill', d => {
      const prov = matchProv(d.properties?.name || d.properties?.NAME || d.properties?.PROVINSI || '');
      if (!prov) return '#e2e5df';
      return mapColorScale(getTotalProv(prov.id));
    })
    .attr('stroke', '#fff').attr('stroke-width', 0.8)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
      const prov = matchProv(d.properties?.name || d.properties?.NAME || d.properties?.PROVINSI || '');
      const tt = document.getElementById('map-tooltip');
      if (prov) {
        const tot = getTotalProv(prov.id);
        tt.innerHTML = `<strong>${prov.nama}</strong>
          <div class="tt-row"><span>Total Kasus</span><span class="tt-val">${fmtFull(tot)}</span></div>
          <div class="tt-row"><span>Tahun</span><span class="tt-val">${state.tahun}</span></div>`;
        tt.style.display = 'block';
        d3.select(this).attr('stroke', '#059669').attr('stroke-width', 2);
      }
    })
    .on('mousemove', function(event) {
      const tt = document.getElementById('map-tooltip');
      tt.style.left = (event.clientX + 14) + 'px';
      tt.style.top = (event.clientY - 10) + 'px';
    })
    .on('mouseout', function() {
      document.getElementById('map-tooltip').style.display = 'none';
      d3.select(this).attr('stroke', '#fff').attr('stroke-width', 0.8);
    })
    .on('click', function(event, d) {
      const prov = matchProv(d.properties?.name || d.properties?.NAME || d.properties?.PROVINSI || '');
      if (prov) { selectProvinsi(prov.id); switchTab('detail'); }
    });

  buildMapLegend(maxVal);
}

function buildFallbackMap() {
  // Simple choropleth table as fallback
  const sorted = [...PROVINSI_DATA].map(p => ({ p, tot: getTotalProv(p.id) })).sort((a,b) => b.tot-a.tot);
  const max = sorted[0].tot;
  return `<div style="padding:16px;width:100%">
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px">Tampilan peta alternatif (tile)</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px">
      ${sorted.map(({p,tot}) => `
        <div onclick="selectProvinsi('${p.id}');switchTab('detail')"
          style="padding:8px 10px;border-radius:8px;background:${d3.interpolate('#d1fae5','#065f46')(tot/max)};cursor:pointer;text-align:center"
          title="${p.nama}: ${fmtFull(tot)} kasus">
          <div style="font-size:10px;font-weight:600;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)">${p.nama.replace('Kalimantan ','Kal.').replace('Sulawesi ','Sul.').replace('Sumatera ','Sum.').replace('Nusa Tenggara','NT')}</div>
          <div style="font-size:11px;color:rgba(255,255,255,.85);font-family:'DM Mono',monospace">${fmt(tot)}</div>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function buildMapLegend(maxVal) {
  const legend = document.getElementById('map-legend');
  if (!legend) return;
  const steps = 5;
  legend.innerHTML = '<span style="font-size:11px;color:var(--text3);margin-right:6px">Rendah</span>';
  for (let i = 0; i <= steps; i++) {
    const v = (i / steps) * maxVal;
    const col = mapColorScale(v);
    legend.innerHTML += `<div class="legend-item"><div class="legend-swatch" style="background:${col}"></div><span>${fmt(v)}</span></div>`;
  }
  legend.innerHTML += '<span style="font-size:11px;color:var(--text3);margin-left:6px">Tinggi</span>';
}

function onSliderPeta(val) {
  state.tahun = +val;
  document.getElementById('slider-peta-lbl').textContent = val;
  document.getElementById('tahun-select').value = val;
  updateHeader();
  if (mapSvg) {
    const values = PROVINSI_DATA.map(p => getTotalProv(p.id));
    const maxVal = d3.max(values);
    mapColorScale = d3.scaleSequential([0, maxVal], SKEMA[state.skema].interpolator());
    // re-color
    mapSvg.selectAll('path').attr('fill', function(d) {
      const prov = matchProv2(d.properties?.name || d.properties?.NAME || d.properties?.PROVINSI || '');
      if (!prov) return '#e2e5df';
      return mapColorScale(getTotalProv(prov.id));
    });
    buildMapLegend(maxVal);
  }
}

function matchProv2(geoName) {
  if (!geoName) return null;
  const n = geoName.toLowerCase().replace(/[^a-z\s]/g, '').trim();
  return PROVINSI_DATA.find(p => {
    const pn = p.nama.toLowerCase().replace(/[^a-z\s]/g, '').trim();
    return n.includes(pn.split(' ')[0]) || pn.includes(n.split(' ')[0]);
  });
}

function renderHeatmap(ca) {
  const c = card('Heatmap Provinsi × Tahun', 'Warna menunjukkan intensitas relatif; klik sel untuk detail', `
    <div class="heatmap-wrap" id="heatmap-body"></div>
  `, [
    btnSm('Semua Kasus', 'hm-all'),
    ...JENIS_KASUS.map(jk => btnSm(jk.label, 'hm-' + jk.id))
  ]);
  ca.appendChild(c);
  requestAnimationFrame(() => buildHeatmap('all'));

  // Wire up buttons
  ca.querySelectorAll('.btn-sm').forEach(b => {
    const id = b.id.replace('hm-', '');
    b.onclick = () => {
      ca.querySelectorAll('.btn-sm').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      buildHeatmap(id);
    };
  });
  ca.querySelector('#hm-all')?.classList.add('active');
}

function buildHeatmap(jenisId) {
  const container = document.getElementById('heatmap-body');
  if (!container) return;

  const getValue = (provId, tahun) => jenisId === 'all'
    ? totalProvinsiTahun(DATA, provId, tahun)
    : (DATA[provId]?.tahunan[tahun]?.[jenisId] || 0);

  const allVals = PROVINSI_DATA.flatMap(p => TAHUN.map(t => getValue(p.id, t)));
  const maxVal = Math.max(...allVals);
  const colorFn = d3.scaleSequential([0, maxVal], SKEMA[state.skema].interpolator());

  const sorted = [...PROVINSI_DATA]
    .map(p => ({ p, tot: TAHUN.reduce((s, t) => s + getValue(p.id, t), 0) }))
    .sort((a,b) => b.tot - a.tot);

  let html = `<table class="heatmap-table"><thead><tr>
    <th>Provinsi</th>${TAHUN.map(t => `<th>${t}</th>`).join('')}
  </tr></thead><tbody>`;

  sorted.forEach(({ p }) => {
    html += `<tr>`;
    html += `<td onclick="selectProvinsi('${p.id}');switchTab('detail')" style="cursor:pointer;color:var(--accent2)">${p.nama}</td>`;
    TAHUN.forEach(t => {
      const v = getValue(p.id, t);
      const bg = colorFn(v);
      const lum = d3.hsl(bg).l;
      const textCol = lum > 0.55 ? '#1a1f18' : '#ffffff';
      html += `<td style="background:${bg};color:${textCol}" title="${p.nama}, ${t}: ${fmtFull(v)} kasus">${fmt(v)}</td>`;
    });
    html += `</tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

function quickCompare(id) {
  if (!state.compareA) { state.compareA = id; updateComparePanel(); }
  else if (!state.compareB && id !== state.compareA) { state.compareB = id; updateComparePanel(); renderTab(); }
}

function selectProvinsi(id) {
  state.selectedProv = state.selectedProv === id ? null : id;
  document.getElementById('sidebar-mode-lbl').textContent = state.selectedProv ? DATA[state.selectedProv]?.nama : 'Nasional';
  buildProvinsiList(document.getElementById('prov-search').value);
}

// ════════════════════════════════════════════
// COMPARE PANEL
// ════════════════════════════════════════════
function handleCompareSlotClick(slot) {
  if (!state.selectedProv) { alert('Pilih provinsi dari daftar terlebih dahulu.'); return; }
  if (slot === 'a') state.compareA = state.selectedProv;
  else state.compareB = state.selectedProv;
  updateComparePanel();
}

function updateComparePanel() {
  const slotA = document.getElementById('cmp-a');
  const slotB = document.getElementById('cmp-b');
  const textA = document.getElementById('cmp-a-text');
  const textB = document.getElementById('cmp-b-text');

  if (state.compareA) {
    slotA.className = 'compare-slot filled';
    textA.innerHTML = DATA[state.compareA]?.nama + ' <span class="remove-btn" onclick="state.compareA=null;updateComparePanel()">×</span>';
  } else {
    slotA.className = 'compare-slot';
    textA.textContent = '+ Pilih A';
  }
  if (state.compareB) {
    slotB.className = 'compare-slot filled';
    textB.innerHTML = DATA[state.compareB]?.nama + ' <span class="remove-btn" onclick="state.compareB=null;updateComparePanel()">×</span>';
  } else {
    slotB.className = 'compare-slot';
    textB.textContent = '+ Pilih B';
  }
}

function doCompare() {
  if (!state.compareA || !state.compareB) { alert('Pilih dua provinsi terlebih dahulu.'); return; }
  switchTab('compare');
}

function toggleTweaks() {
  document.getElementById('tweaks-panel').classList.toggle('visible');
}

function applyKasusTweak(val) {
  state.filterKasus = val;
  buildProvinsiList();
  renderTab();
}

function applySatuan(val) {
  state.satuan = val;
  buildProvinsiList();
  renderTab();
}

function registerTweaks() {
  window.addEventListener('message', e => {
    if (e.data?.type === '__activate_edit_mode') toggleTweaks();
    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
}

function card(title, subtitle, bodyHTML, actions = []) {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-title">${title}</div>
        ${subtitle ? `<div class="card-subtitle">${subtitle}</div>` : ''}
      </div>
      ${actions.length ? `<div class="card-actions">${actions.map(a => a.outerHTML).join('')}</div>` : ''}
    </div>
    <div class="card-body">${bodyHTML}</div>
  `;
  return div;
}

function btnSm(label, id) {
  const b = document.createElement('button');
  b.className = 'btn-sm'; b.id = id; b.textContent = label;
  return b;
}
